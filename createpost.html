<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* 📦 CONTAINER */
.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

/* 🔙 BACK */
.back {
  cursor: pointer;
  color: #38bdf8;
  margin-bottom: 15px;
  display: inline-block;
}

/* 🧊 CARD */
.card {
  background: rgba(30, 41, 59, 0.8);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* ✏️ TEXTAREA */
textarea {
  width: 100%;
  height: 140px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  resize: none;
  font-size: 15px;
  background: #0f172a;
  color: white;
}

/* 📁 FILE INPUT */
.file-box {
  margin-top: 15px;
  border: 2px dashed #38bdf8;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.file-box:hover {
  background: rgba(56, 189, 248, 0.1);
}

input[type="file"] {
  display: none;
}

/* 👀 PREVIEW */
.preview {
  margin-top: 15px;
}

.preview img,
.preview video {
  width: 100%;
  border-radius: 10px;
}

.preview audio {
  width: 100%;
}

/* 🚀 BUTTON */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(135deg, #38bdf8, #8b5cf6);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

button:disabled {
  background: gray;
}

/* 📱 MOBILE */
@media(max-width:600px){
  .container {
    padding: 15px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="back" onclick="goBack()">⬅ Back</div>

<div class="card">

<h2>Create Post</h2>

<textarea id="postContent" placeholder="Share your vibe 🎸..."></textarea>

<!-- 📁 FILE UI -->
<label class="file-box">
  Upload Image / Video / Audio 🎬
  <input type="file" id="mediaFile" accept="image/*,video/*,audio/*">
</label>

<div id="preview" class="preview"></div>

<button id="postBtn" onclick="createPost()">Post</button>

</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let currentUserId = "";

/* 🔙 */
window.goBack = () => window.location.href = "home.html";

/* 🔐 AUTH */
onAuthStateChanged(auth, (user) => {
  if (user) currentUserId = user.uid;
  else window.location.href = "index.html";
});

/* 👀 PREVIEW */
const fileInput = document.getElementById("mediaFile");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  preview.innerHTML = "";

  if (!file) return;

  const url = URL.createObjectURL(file);

  if (file.type.startsWith("image")) {
    preview.innerHTML = `<img src="${url}">`;
  } 
  else if (file.type.startsWith("video")) {
    preview.innerHTML = `<video controls src="${url}"></video>`;
  } 
  else if (file.type.startsWith("audio")) {
    preview.innerHTML = `<audio controls src="${url}"></audio>`;
  }
});

/* 🚀 POST */
window.createPost = async function () {

  const btn = document.getElementById("postBtn");
  btn.disabled = true;
  btn.innerText = "Posting...";

  const text = document.getElementById("postContent").value.trim();
  const file = fileInput.files[0];

  if (!text && !file) {
    alert("Write something or upload media!");
    btn.disabled = false;
    btn.innerText = "Post";
    return;
  }

  let mediaURL = "";
  let mediaType = "";

  if (file) {
    try {

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "Collab-Tune");

      const res = await fetch(
        "https://api.cloudinary.com/v1_1/dcnlky6zb/upload",
        { method: "POST", body: formData }
      );

      const data = await res.json();
      mediaURL = data.secure_url;

      if (file.type.startsWith("image")) mediaType = "image";
      else if (file.type.startsWith("video")) mediaType = "video";
      else if (file.type.startsWith("audio")) mediaType = "audio";

    } catch (err) {
      alert("Upload failed ❌");
      btn.disabled = false;
      btn.innerText = "Post";
      return;
    }
  }

  await addDoc(collection(db, "posts"), {
    userId: currentUserId,
    content: text,
    mediaURL,
    mediaType,
    timestamp: Date.now()
  });

  alert("Posted 🎉");
  location.href = "home.html";
};

</script>

</body>
</html>
