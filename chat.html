<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* 📦 CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    background: #111827;
    font-weight: bold;
}

/* 💎 CHAT CARD */
.chat-item {
    width: 90%;
    max-width: 500px;
    margin: 10px auto;
    padding: 12px;

    display: flex;
    gap: 10px;
    align-items: center;

    background: #1e293b;
    border-radius: 12px;
    cursor: pointer;
}

.chat-item img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.chat-info {
    flex: 1;
}

.last-msg {
    font-size: 12px;
    color: #94a3b8;
}

.unread {
    background: red;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 12px;
}

/* CHAT VIEW */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 6px 0;
    padding: 10px;
    border-radius: 12px;
    max-width: 70%;
}

.my {
    background: #38bdf8;
    margin-left: auto;
}

.other {
    background: #1e293b;
}

/* INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

.input-box button {
    margin-left: 8px;
    padding: 10px;
    border-radius: 20px;
        background: linear-gradient(135deg, #38bdf8, #8b5cf6);
        color: white;
        border: none;
        cursor: pointer;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<!-- CHAT LIST -->
<div id="listView">
    <div class="header">Messages</div>
    <div id="chatList"></div>
</div>

<!-- CHAT -->
<div id="chatView" style="display:none; flex:1; flex-direction:column;">
    <div class="header">
        <span onclick="goBack()">⬅</span>
        <span id="chatWith"></span>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-box">
        <input id="msgInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import {
collection, onSnapshot, doc, getDoc, addDoc,
query, orderBy, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let currentUserId = "";
let receiverId = "";

/* AUTH */
onAuthStateChanged(auth, (user) => {
    if (!user) location.href = "index.html";

    currentUserId = user.uid;
    loadChatList();
});

/* LOAD CHAT LIST */
function loadChatList(){

    onSnapshot(collection(db, "messages"), async (snapshot) => {

        let chatMap = {};
        let unreadMap = {};

        snapshot.forEach((docSnap) => {
            const msg = docSnap.data();

            let otherUser = null;

            if (msg.senderId === currentUserId)
                otherUser = msg.receiverId;
            else if (msg.receiverId === currentUserId)
                otherUser = msg.senderId;

            if (!otherUser) return;

            if (!chatMap[otherUser] || msg.timestamp > chatMap[otherUser].timestamp) {
                chatMap[otherUser] = msg;
            }

            if (msg.receiverId === currentUserId && !msg.seen) {
                unreadMap[otherUser] = (unreadMap[otherUser] || 0) + 1;
            }
        });

        const sortedUsers = Object.keys(chatMap).sort((a, b) =>
            chatMap[b].timestamp - chatMap[a].timestamp
        );

        chatList.innerHTML = "";

        for (const uid of sortedUsers) {

            const userSnap = await getDoc(doc(db, "users", uid));
            const user = userSnap.data() || {};

            chatList.innerHTML += `
                <div class="chat-item" onclick="openChat('${uid}')">

                    <img src="${user.profileImage || 'https://via.placeholder.com/40'}">

                    <div class="chat-info">
                        <div>${user.name || "User"}</div>
                        <div class="last-msg">${chatMap[uid].text || ""}</div>
                    </div>

                    ${unreadMap[uid] 
                        ? `<div class="unread">${unreadMap[uid]}</div>` 
                        : ""
                    }

                </div>
            `;
        }
    });
}

/* OPEN CHAT */
window.openChat = async function(uid){
    receiverId = uid;

    listView.style.display = "none";
    chatView.style.display = "flex";

    const snap = await getDoc(doc(db, "users", uid));
    chatWith.innerText = snap.data()?.name || "User";

    loadMessages();
};

/* LOAD MESSAGES */
function loadMessages(){

    const q = query(collection(db, "messages"), orderBy("timestamp"));

    onSnapshot(q, (snapshot) => {

        chatBox.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const msg = docSnap.data();

            const isChat =
                (msg.senderId === currentUserId && msg.receiverId === receiverId) ||
                (msg.senderId === receiverId && msg.receiverId === currentUserId);

            if (isChat) {

                if (msg.receiverId === currentUserId && !msg.seen) {
                    updateDoc(doc(db, "messages", docSnap.id), { seen: true });
                }

                const isMe = msg.senderId === currentUserId;

                chatBox.innerHTML += `
                <div class="message ${isMe ? "my" : "other"}">
                    ${msg.text}
                </div>`;
            }
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* SEND MESSAGE */
window.sendMessage = async function () {
    const text = msgInput.value.trim();
    if (!text) return;

    await addDoc(collection(db, "messages"), {
        senderId: currentUserId,
        receiverId: receiverId,
        text: text,
        timestamp: Date.now(),
        seen: false
    });

    msgInput.value = "";
};

/* BACK */
window.goBack = function(){
    chatView.style.display = "none";
    listView.style.display = "block";
};

</script>
</body>
</html>
