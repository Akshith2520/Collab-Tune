<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* 📦 CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 🔝 HEADER */
.header {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    background: #111827;
}

/* 📋 CHAT LIST */
.chat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    margin: 8px 10px;
    cursor: pointer;
    transition: 0.2s;
}

.chat-item:hover {
    background: #334155;
    transform: scale(1.02);
}

.chat-item img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* 💬 CHAT VIEW */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #0f172a;
}

/* 🗨 MESSAGE */
.message {
    margin: 8px 0;
    padding: 10px 12px;
    border-radius: 15px;
    max-width: 70%;
    font-size: 14px;
    line-height: 1.4;
}

/* 💙 MY MESSAGE */
.my {
    background: linear-gradient(135deg, #2563eb, #38bdf8);
    margin-left: auto;
    border-bottom-right-radius: 2px;
}

/* ⚪ OTHER MESSAGE */
.other {
    background: #1e293b;
    border-bottom-left-radius: 2px;
}

/* ⌨ INPUT */
.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.input-box button {
    margin-left: 8px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
}

/* 🔙 BACK */
.back {
    cursor: pointer;
    padding: 10px;
    color: #38bdf8;
}

/* 📱 RESPONSIVE */
@media(max-width:600px){
    .container {
        height: 100vh;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- 📋 CHAT LIST -->
    <div id="listView">
        <div class="header">Messages</div>
        <div id="chatList"></div>
    </div>

    <!-- 💬 CHAT VIEW -->
    <div id="chatView" style="display:none; flex:1; flex-direction:column;">

        <div class="header">
            <span class="back" onclick="goBack()">⬅</span>
            <span id="chatWith"></span>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { collection, onSnapshot, doc, getDoc, addDoc, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const receiverId = params.get("uid");

let currentUserId = "";

/* 🔐 AUTH */
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserId = user.uid;

        if (receiverId) showChat();
        else showList();

    } else {
        window.location.href = "index.html";
    }
});

/* 📋 CHAT LIST */
function showList() {

    listView.style.display = "block";
    chatView.style.display = "none";

    onSnapshot(collection(db, "messages"), async (snapshot) => {

        chatList.innerHTML = "";
        let usersSet = new Set();

        snapshot.forEach((docSnap) => {
            const msg = docSnap.data();

            if (msg.senderId === currentUserId)
                usersSet.add(msg.receiverId);
            else if (msg.receiverId === currentUserId)
                usersSet.add(msg.senderId);
        });

        for (const uid of usersSet) {

            const userSnap = await getDoc(doc(db, "users", uid));
            const user = userSnap.data() || {};

            chatList.innerHTML += `
                <div class="chat-item" onclick="openChat('${uid}')">
                    <img src="${user.profileImage || 'https://via.placeholder.com/40'}">
                    <div>${user.name || "User"}</div>
                </div>
            `;
        }
    });
}

/* 💬 CHAT VIEW */
function showChat() {

    listView.style.display = "none";
    chatView.style.display = "flex";

    loadReceiver();
    loadMessages();
}

/* 👤 RECEIVER */
async function loadReceiver() {
    const snap = await getDoc(doc(db, "users", receiverId));
    chatWith.innerText = snap.exists() ? snap.data().name : "User";
}

/* 📥 MESSAGES */
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("timestamp"));

    onSnapshot(q, (snapshot) => {

        chatBox.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const msg = docSnap.data();

            const isChat =
                (msg.senderId === currentUserId && msg.receiverId === receiverId) ||
                (msg.senderId === receiverId && msg.receiverId === currentUserId);

            if (isChat) {
                const isMe = msg.senderId === currentUserId;

                chatBox.innerHTML += `
                    <div class="message ${isMe ? "my" : "other"}">
                        ${msg.text}
                    </div>
                `;
            }
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* 📤 SEND */
window.sendMessage = async function () {

    const text = msgInput.value.trim();
    if (!text) return;

    await addDoc(collection(db, "messages"), {
        senderId: currentUserId,
        receiverId: receiverId,
        text: text,
        timestamp: Date.now()
    });

    msgInput.value = "";
};

/* 🔀 NAV */
window.openChat = uid => location.href = "chat.html?uid=" + uid;
window.goBack = () => location.href = "chat.html";

</script>

</body>
</html>
