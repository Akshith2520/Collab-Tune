<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CollabTune – Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:   #38bdf8;
  --accent2:  #8b5cf6;
  --bg:       #060d1f;
  --surface:  rgba(15,23,42,0.75);
  --surface2: rgba(30,41,59,0.65);
  --border:   rgba(148,163,184,0.15);
  --text:     #e2e8f0;
  --muted:    #64748b;
  --font-d:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
}
body {
  font-family: var(--font-b); background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* ── BACKGROUND CANVAS & ORBS ── */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.15; pointer-events: none; z-index: 0; animation: orbFloat 14s ease-in-out infinite alternate; }
.orb-1 { width:500px;height:500px;background:#7c3aed;top:-150px;left:-100px;animation-duration:16s; }
.orb-2 { width:400px;height:400px;background:#0ea5e9;bottom:-100px;right:-80px;animation-duration:12s;animation-delay:-6s; }
@keyframes orbFloat { from { transform:translate(0,0) scale(1); } to { transform:translate(30px,22px) scale(1.1); } }

/* ── NAVBAR ── */
.navbar {
  position: relative; z-index: 200; background: rgba(6,13,31,0.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); padding: 0 24px; height: 62px; display: flex; align-items: center;
}
.nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer;}
.nav-brand-icon { width:36px;height:36px; border-radius:10px; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex;align-items:center;justify-content:center; font-size:18px; }
.nav-brand-name { font-family:var(--font-d); font-weight:800;font-size:17px; color:#f1f5f9; }

/* ── MAIN LAYOUT ── */
.container {
  position: relative; z-index: 10; flex: 1; max-width: 700px; margin: 20px auto; width: 100%;
  display: flex; flex-direction: column; padding: 0 16px; overflow: hidden;
}
.glass-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  backdrop-filter: blur(16px); display: flex; flex-direction: column; height: 100%; overflow: hidden;
}

/* ── HEADERS ── */
.header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: rgba(15,23,42,0.4);
}
.header-title { font-family: var(--font-d); font-weight: 700; font-size: 18px; }
.back-btn { cursor: pointer; color: var(--accent); display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: rgba(56,189,248,0.1); transition: 0.2s; border: none; }
.back-btn:hover { background: rgba(56,189,248,0.2); }

.chat-profile-header { display: flex; align-items: center; gap: 12px; }
.chat-profile-header img { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
.chat-header-info { display: flex; flex-direction: column; }
.chat-header-name { font-family: var(--font-d); font-weight: 700; font-size: 16px; color: white; }
.chat-header-status { font-size: 12px; color: var(--accent); } 

/* ── CHAT LIST (INBOX) ── */
#listView { display: flex; flex-direction: column; height: 100%; }

/* ── INBOX SEARCH ── */
.chat-search-wrapper { position: relative; padding: 10px 16px 0; }
.chat-search-wrapper .search-icon { 
  position: absolute; left: 30px; top: 60%; transform: translateY(-50%); 
  width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; pointer-events: none; 
}
.chat-search-wrapper input { 
  width: 100%; padding: 10px 16px 10px 40px; border-radius: 50px; border: 1px solid var(--border); 
  background: rgba(15,23,42,0.5); color: white; font-family: var(--font-b); font-size: 13.5px; 
  outline: none; transition: 0.2s; 
}
.chat-search-wrapper input:focus { border-color: var(--accent); background: rgba(15,23,42,0.8); }
.chat-search-wrapper input::placeholder { color: var(--muted); }

#chatList { overflow-y: auto; flex: 1; padding: 10px; }
.chat-item {
  display: flex; gap: 14px; align-items: center; padding: 12px 16px;
  border-radius: 16px; cursor: pointer; transition: background 0.2s, transform 0.2s; margin-bottom: 6px;
}
.chat-item:hover { background: var(--surface2); transform: translateX(4px); }
.chat-item img { width: 48px; height: 48px; border-radius: 14px; object-fit: cover; border: 1px solid var(--border); }
.chat-info { flex: 1; min-width: 0; }
.chat-name { font-family: var(--font-d); font-weight: 600; color: #f1f5f9; font-size: 15px; }
.last-msg { font-size: 13px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.unread-badge { background: #ef4444; color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; box-shadow: 0 0 10px rgba(239,68,68,0.4); }

/* ── CHAT VIEW (MESSAGES) ── */
#chatView { display: none; flex-direction: column; height: 100%; }
#chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.message-wrapper { display: flex; flex-direction: column; max-width: 75%; }
.message-wrapper.my { align-self: flex-end; align-items: flex-end; }
.message-wrapper.other { align-self: flex-start; align-items: flex-start; }

.message { padding: 10px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; word-wrap: break-word; }
.my .message { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(56,189,248,0.2); }
.other .message { background: var(--surface2); color: #f1f5f9; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

/* Media */
.msg-media { max-width: 100%; border-radius: 12px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); }
.msg-file { display: inline-flex; align-items: center; gap: 8px; color: white; text-decoration: none; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 10px; }
.msg-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
.msg-ticks { font-weight: bold; font-size: 12px; }
.tick-sent { color: #94a3b8; }
.tick-seen { color: #38bdf8; text-shadow: 0 0 5px rgba(56,189,248,0.5); }

/* ── INPUT AREA & MEDIA PREVIEW ── */
#mediaPreview {
  display: none; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: rgba(56,189,248,0.1); border-top: 1px solid var(--border);
  font-size: 13px; color: var(--accent); font-weight: 600;
}
#mediaPreview button { background: none; border: none; color: white; cursor: pointer; font-size: 16px; padding: 0 5px; }

.input-box {
  padding: 14px 16px; border-top: 1px solid var(--border); background: rgba(6,13,31,0.6);
  display: flex; gap: 10px; align-items: center;
}
.attach-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; }
.attach-btn:hover { color: var(--accent); background: rgba(56,189,248,0.1); }
.attach-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.input-box input[type="text"] {
  flex: 1; padding: 12px 18px; border-radius: 50px; border: 1px solid var(--border);
  background: rgba(15,23,42,0.8); color: var(--text); font-family: var(--font-b); font-size: 14px; outline: none; transition: 0.2s;
}
.input-box input[type="text"]:focus { border-color: rgba(56,189,248,0.4); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
.input-box input[type="text"]:disabled { opacity: 0.5; }

.send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.1); box-shadow: 0 4px 15px rgba(139,92,246,0.4); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.send-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; margin-left: 2px; }

#mediaInput { display: none; }
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="navbar">
  <a class="nav-brand" href="home.html">
    <div class="nav-brand-icon">🎸</div>
    <span class="nav-brand-name">CollabTune</span>
  </a>
</nav>

<div class="container">
  <div class="glass-panel">
    
    <div id="listView">
      <div class="header">
        <div class="header-title">Inbox</div>
      </div>
      
      <div class="chat-search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="chatSearchInput" placeholder="Search messages or names..." autocomplete="off">
      </div>

      <div id="chatList"></div>
    </div>

    <div id="chatView">
      <div class="header">
        <button class="back-btn" onclick="goBack()">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="chat-profile-header">
          <img id="chatWithAvatar" src="https://via.placeholder.com/40">
          <div class="chat-header-info">
            <span class="chat-header-name" id="chatWithName">Loading...</span>
            <span class="chat-header-status" id="chatHeaderStatus"></span>
          </div>
        </div>
      </div>

      <div id="chatBox"></div>

      <div id="mediaPreview">
        <span id="mediaPreviewName">📎 filename.jpg</span>
        <button onclick="clearMedia()">✕</button>
      </div>

      <div class="input-box">
        <button class="attach-btn" onclick="document.getElementById('mediaInput').click()" title="Attach File">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="mediaInput" accept="image/*,video/*,audio/*,application/pdf">
        
        <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { collection, onSnapshot, doc, getDoc, addDoc, query, orderBy, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ☁️ CLOUDINARY CONFIGURATION (YOUR CREDENTIALS)
const CLOUD_NAME = "dcnlky6zb"; 
const UPLOAD_PRESET = "Collab-Tune"; 
const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

let currentUserId = "";
let receiverId = "";
const userCache = {}; 
let inboxCache = []; // Cache to allow instant searching
let unsubscribeMessages = null;
let pendingMediaFile = null; 

onAuthStateChanged(auth, (user) => {
    if (!user) location.href = "index.html";
    currentUserId = user.uid;
    loadChatList();

    const params = new URLSearchParams(window.location.search);
    const autoOpenUid = params.get("uid");
    if(autoOpenUid) window.openChat(autoOpenUid); 
});

/* ── LATENCY FIX: LOAD CHAT LIST & PARALLEL FETCH ── */
function loadChatList(){
    const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
    
    onSnapshot(q, async (snapshot) => {
        let chatMap = {};
        let unreadMap = {};

        snapshot.forEach((docSnap) => {
            const msg = docSnap.data();
            if (msg.senderId === currentUserId || msg.receiverId === currentUserId) {
                let otherUser = msg.senderId === currentUserId ? msg.receiverId : msg.senderId;
                chatMap[otherUser] = msg; 
                if (msg.receiverId === currentUserId && !msg.seen) {
                    unreadMap[otherUser] = (unreadMap[otherUser] || 0) + 1;
                }
            }
        });

        const sortedUsers = Object.keys(chatMap).sort((a, b) => chatMap[b].timestamp - chatMap[a].timestamp);
        
        const missingUsers = sortedUsers.filter(uid => !userCache[uid]);
        await Promise.all(missingUsers.map(async (uid) => {
            const snap = await getDoc(doc(db, "users", uid));
            userCache[uid] = snap.data() || { name: "User", profileImage: "" };
        }));

        // Populate Inbox Cache
        inboxCache = sortedUsers.map(uid => ({
            uid: uid,
            user: userCache[uid],
            lastMsg: chatMap[uid],
            unreadCount: unreadMap[uid] || 0
        }));

        renderInbox(); 
    });
}

/* ── INSTANT SEARCH RENDERING ── */
window.renderInbox = function() {
    const chatList = document.getElementById("chatList");
    const searchInput = document.getElementById("chatSearchInput");
    const queryTerm = (searchInput.value || "").toLowerCase().trim();
    chatList.innerHTML = "";

    // Filter by name or message text
    const filteredInbox = inboxCache.filter(item => {
        const name = (item.user.name || "").toLowerCase();
        const text = (item.lastMsg.text || "").toLowerCase();
        return name.includes(queryTerm) || text.includes(queryTerm);
    });

    if (filteredInbox.length === 0) {
        chatList.innerHTML = `<p style="text-align:center; color:var(--muted); margin-top:20px; font-size:14px;">No conversations found.</p>`;
        return;
    }

    filteredInbox.forEach(item => {
        let displayMsg = item.lastMsg.text || (item.lastMsg.mediaType ? `Attached a file 📎` : "");

        chatList.innerHTML += `
            <div class="chat-item" onclick="openChat('${item.uid}')">
                <img src="${item.user.profileImage || 'https://via.placeholder.com/48'}">
                <div class="chat-info">
                    <div class="chat-name">${item.user.name || "User"}</div>
                    <div class="last-msg">${displayMsg}</div>
                </div>
                ${item.unreadCount ? `<div class="unread-badge">${item.unreadCount}</div>` : ""}
            </div>
        `;
    });
};

// Bind the search input listener
document.getElementById("chatSearchInput").addEventListener("input", renderInbox);


/* ── OPEN CHAT ── */
window.openChat = async function(uid){
    receiverId = uid;
    document.getElementById("listView").style.display = "none";
    document.getElementById("chatView").style.display = "flex";
    
    const uData = userCache[uid] || (await getDoc(doc(db, "users", uid))).data();
    document.getElementById("chatWithName").innerText = uData?.name || "User";
    document.getElementById("chatHeaderStatus").innerText = uData?.role || "Musician"; 
    document.getElementById("chatWithAvatar").src = uData?.profileImage || "https://via.placeholder.com/40";

    loadMessages();
};

/* ── LOAD MESSAGES & TICKS ── */
function loadMessages(){
    if (unsubscribeMessages) unsubscribeMessages();
    const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));

    unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        snapshot.forEach((docSnap) => {
            const msg = docSnap.data();
            const isChat = (msg.senderId === currentUserId && msg.receiverId === receiverId) || (msg.senderId === receiverId && msg.receiverId === currentUserId);

            if (isChat) {
                if (msg.receiverId === currentUserId && !msg.seen) {
                    updateDoc(doc(db, "messages", docSnap.id), { seen: true });
                }

                const isMe = msg.senderId === currentUserId;
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                let ticks = "";
                if (isMe) ticks = `<span class="msg-ticks ${msg.seen ? 'tick-seen' : 'tick-sent'}">${msg.seen ? '✓✓' : '✓'}</span>`;

                let mediaHtml = "";
                if (msg.mediaUrl) {
                    if (msg.mediaType.startsWith("image/")) mediaHtml = `<img src="${msg.mediaUrl}" class="msg-media">`;
                    else if (msg.mediaType.startsWith("video/")) mediaHtml = `<video controls src="${msg.mediaUrl}" class="msg-media"></video>`;
                    else if (msg.mediaType.startsWith("audio/")) mediaHtml = `<audio controls src="${msg.mediaUrl}" class="msg-media"></audio>`;
                    else mediaHtml = `<a href="${msg.mediaUrl}" target="_blank" class="msg-file">📄 View Document</a>`;
                }

                chatBox.innerHTML += `
                <div class="message-wrapper ${isMe ? "my" : "other"}">
                    <div class="message">
                        ${mediaHtml}
                        ${msg.text ? `<div>${msg.text}</div>` : ""}
                    </div>
                    <div class="msg-meta">
                        <span class="msg-time">${timeStr}</span> ${ticks}
                    </div>
                </div>`;
            }
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* ── MEDIA SELECTION UI ── */
document.getElementById("mediaInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    pendingMediaFile = file;
    document.getElementById("mediaPreviewName").innerText = `📎 ${file.name}`;
    document.getElementById("mediaPreview").style.display = "flex";
});

window.clearMedia = function() {
    pendingMediaFile = null;
    document.getElementById("mediaInput").value = "";
    document.getElementById("mediaPreview").style.display = "none";
};

/* ── SEND MESSAGE VIA CLOUDINARY ── */
window.sendMessage = async function () {
    const input = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const text = input.value.trim();
    
    if (!text && !pendingMediaFile) return;

    input.disabled = true;
    sendBtn.disabled = true;

    try {
        let mediaUrl = null;
        let mediaType = null;

        if (pendingMediaFile) {
            input.placeholder = "Uploading to Cloudinary...";
            
            const formData = new FormData();
            formData.append("file", pendingMediaFile);
            formData.append("upload_preset", UPLOAD_PRESET);

            const response = await fetch(CLOUDINARY_URL, {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            
            if (data.secure_url) {
                mediaUrl = data.secure_url;
                mediaType = pendingMediaFile.type;
            } else {
                console.error("Cloudinary Error:", data);
                throw new Error("Cloudinary upload failed");
            }
        }
        
        input.placeholder = "Sending...";

        await addDoc(collection(db, "messages"), {
            senderId: currentUserId,
            receiverId: receiverId,
            text: text,
            mediaUrl: mediaUrl,
            mediaType: mediaType,
            timestamp: Date.now(),
            seen: false
        });

        input.value = "";
        clearMedia(); 
    } catch (error) {
        console.error("Failed to send message:", error);
        alert("Upload failed. Double-check that your Cloudinary Preset is set to 'Unsigned'.");
    } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.placeholder = "Message...";
        input.focus();
    }
};

document.getElementById("msgInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !document.getElementById("msgInput").disabled) window.sendMessage();
});

window.goBack = function(){
    if(unsubscribeMessages) unsubscribeMessages();
    clearMedia();
    document.getElementById("chatView").style.display = "none";
    document.getElementById("listView").style.display = "flex";
};

/* ── BACKGROUND CANVAS FIX ── */
(function(){
  const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
  let W, H; function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  const notes = ['♩','♪','♫','♬']; const particles = [];
  function spawn(){ particles.push({ x: Math.random()*W, y: H+20, note: notes[Math.floor(Math.random()*notes.length)], size: 12+Math.random()*16, speed: 0.35+Math.random()*0.6, drift: (Math.random()-0.5)*0.35, alpha: 0.05+Math.random()*0.1, angle: Math.random()*Math.PI*2, color: ['#a78bfa','#7dd3fc'][Math.floor(Math.random()*2)] }); }
  for(let i=0; i<10; i++){ spawn(); particles[particles.length-1].y = Math.random()*H; }
  let frame = 0;
  function loop(){
    ctx.clearRect(0, 0, W, H); frame++;
    if(frame % 70 === 0) spawn();
    for(let i = particles.length-1; i >= 0; i--){
      const p = particles[i];
      p.y -= p.speed; p.x += p.drift + Math.sin(p.angle)*0.25; p.angle += 0.01;
      if(p.y < -30){ particles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha = p.alpha; ctx.font = `${p.size}px serif`; ctx.fillStyle = p.color; ctx.fillText(p.note, p.x, p.y); ctx.restore();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

</body>
</html>
