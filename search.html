<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Musicians</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.navbar {
    background: #111827;
    padding: 10px 20px;
}

.container {
    max-width: 700px;
    margin: 30px auto;
    padding: 0 15px;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.search-box input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

.search-box button {
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.message-btn {
    margin-top: 10px;
    padding: 8px 12px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Search Musicians</h2>
</div>

<div class="container">

    <!-- SEARCH INPUT -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Enter role (Singer)">
        <button onclick="searchUsers()">Search</button>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

</div>

<script type="module">

import { db } from "./js/firebase-config.js";
import { collection, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔍 Get role from URL
const params = new URLSearchParams(window.location.search);
const roleFromURL = params.get("role");

if (roleFromURL) {
    document.getElementById("searchInput").value = roleFromURL;
    searchUsers();
}

// 🔎 Search Function
window.searchUsers = async function () {

    const role = document.getElementById("searchInput").value.trim().toLowerCase();

    if (!role) {
        alert("Enter role to search");
        return;
    }

    const q = query(collection(db, "users"), where("role", "==", role));
    const snapshot = await getDocs(q);

    const results = document.getElementById("results");
    results.innerHTML = "";

    if (snapshot.empty) {
        results.innerHTML = "<p>No users found 😢</p>";
        return;
    }

    snapshot.forEach((docSnap) => {
        const user = docSnap.data();

        results.innerHTML += `
            <div class="card">
                <h3>${user.name}</h3>
                <p><strong>Role:</strong> ${user.role}</p>
                <p><strong>Bio:</strong> ${user.bio || "No bio"}</p>
                <button class="message-btn" onclick="startChat('${docSnap.id}')">
                    Message
                </button>
            </div>
        `;
    });
};

// 💬 Start Chat
window.startChat = function (userId) {
    window.location.href = "chat.html?uid=" + userId;
};

</script>

</body>
</html>
