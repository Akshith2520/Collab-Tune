<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CollabTune – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* ── RESET & BASE ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:   #38bdf8;
  --accent2:  #8b5cf6;
  --accent3:  #f472b6;
  --bg:       #060d1f;
  --surface:  rgba(15,23,42,0.75);
  --surface2: rgba(30,41,59,0.65);
  --border:   rgba(148,163,184,0.1);
  --text:     #e2e8f0;
  --muted:    #64748b;
  --font-d:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-b);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── CANVAS BG ──────────────────────────────── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── AMBIENT ORBS ───────────────────────────── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.13;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 14s ease-in-out infinite alternate;
}
.orb-1 { width:500px;height:500px;background:#7c3aed;top:-150px;left:-100px;animation-duration:16s; }
.orb-2 { width:400px;height:400px;background:#0ea5e9;bottom:-100px;right:-80px;animation-duration:12s;animation-delay:-6s; }
.orb-3 { width:280px;height:280px;background:#ec4899;top:40%;left:60%;animation-duration:18s;animation-delay:-4s; }
.orb-4 { width:220px;height:220px;background:#06b6d4;top:20%;right:15%;animation-duration:10s;animation-delay:-9s; }

@keyframes orbFloat {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(30px,22px) scale(1.1); }
}

/* ── NAVBAR ─────────────────────────────────── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(6,13,31,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 62px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.nav-brand-icon {
  width:36px;height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 0 16px rgba(139,92,246,0.4);
}
.nav-brand-name {
  font-family:var(--font-d);
  font-weight:800;font-size:17px;
  color:#f1f5f9;letter-spacing:-0.3px;
}

/* FIX #1 — search fills middle column properly */
.nav-search {
  position:relative;
  width:100%;
  max-width:420px;
  margin:0 auto;
}
.nav-search-icon {
  position:absolute;
  left:12px;top:50%;
  transform:translateY(-50%);
  width:16px;height:16px;
  stroke:var(--muted);
  pointer-events:none;
  fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}
.nav-search input {
  width:100%;
  padding:9px 14px 9px 36px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(15,23,42,0.7);
  color:var(--text);
  font-family:var(--font-b);
  font-size:13.5px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.nav-search input::placeholder { color:var(--muted); }
.nav-search input:focus {
  border-color:rgba(56,189,248,0.45);
  box-shadow:0 0 0 3px rgba(56,189,248,0.08);
}

.nav-actions {
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.nav-btn {
  position:relative;
  width:40px;height:40px;
  border-radius:12px;border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,color 0.2s;
}
.nav-btn svg {
  width:20px;height:20px;
  stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
}
.nav-btn:hover { background:rgba(56,189,248,0.08);color:var(--accent); }
.nav-btn.danger:hover { background:rgba(248,113,113,0.08);color:#f87171; }

/* FIX #3 — navbar message badge */
.nav-badge {
  position:absolute;top:5px;right:5px;
  min-width:16px;height:16px;
  background:#ef4444;border-radius:50%;
  font-size:10px;font-weight:700;color:white;
  display:none;align-items:center;justify-content:center;
  padding:0 3px;border:2px solid var(--bg);line-height:1;
}
.nav-badge.show { display:flex;animation:badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1); }

@keyframes badgePop {
  from { transform:scale(0); }
  to   { transform:scale(1); }
}

/* tooltip */
.nav-btn[data-tip] { position:relative; }
.nav-btn[data-tip]::after {
  content:attr(data-tip);
  position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#e2e8f0;font-size:11px;
  padding:4px 8px;border-radius:6px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:300;
}
.nav-btn[data-tip]:hover::after { opacity:1; }

@media(max-width:600px){
  .navbar { padding:0 14px;gap:10px; }
  .nav-brand-name { display:none; }
}

/* ── LAYOUT ─────────────────────────────────── */
.page {
  position:relative;z-index:10;
  max-width:660px;margin:0 auto;
  padding:20px 16px 100px;
}

/* ── PROFILE CARD ───────────────────────────── */
.profile-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:22px 24px;
  backdrop-filter:blur(16px);
  margin-bottom:18px;
  display:flex;align-items:center;gap:16px;
  opacity:0;
  transition:opacity 0.4s ease;
  animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.profile-avatar {
  width:56px;height:56px;border-radius:16px;
  object-fit:cover;
  border:2px solid rgba(56,189,248,0.25);
  flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
}
.profile-text { flex:1;min-width:0; }
.profile-welcome {
  font-family:var(--font-d);font-weight:700;font-size:18px;
  color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.profile-meta { font-size:13px;color:var(--muted);margin-top:2px; }

.mini-wave {
  display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0;
}
.mini-wave span {
  width:3px;border-radius:2px;
  background:linear-gradient(to top,var(--accent),var(--accent2));
  animation:waveBounce 1.1s ease-in-out infinite alternate;
}
.mini-wave span:nth-child(1){height:5px;animation-delay:0s}
.mini-wave span:nth-child(2){height:12px;animation-delay:.1s}
.mini-wave span:nth-child(3){height:8px;animation-delay:.2s}
.mini-wave span:nth-child(4){height:15px;animation-delay:.15s}
.mini-wave span:nth-child(5){height:9px;animation-delay:.05s}
.mini-wave span:nth-child(6){height:13px;animation-delay:.25s}
.mini-wave span:nth-child(7){height:6px;animation-delay:.35s}

@keyframes waveBounce {
  from { transform:scaleY(0.35);opacity:0.5; }
  to   { transform:scaleY(1);opacity:1; }
}

/* ── ACTION BUTTONS ─────────────────────────── */
.action-buttons {
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:22px;
  animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}
.action-btn {
  padding:13px 16px;border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface2);color:white;
  font-family:var(--font-d);font-size:14px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s,background 0.2s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(12px);
}
.action-btn::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:0;transition:opacity 0.25s;
}
.action-btn:hover::before { opacity:0.15; }
.action-btn:hover {
  transform:translateY(-2px);
  border-color:rgba(56,189,248,0.3);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.action-btn:active { transform:scale(0.97); }
.action-btn svg {
  width:18px;height:18px;stroke:var(--accent);fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  position:relative;z-index:1;
}
.action-btn span { position:relative;z-index:1; }

/* ── SKELETONS (FIX #2) ─────────────────────── */
.skeleton {
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:16px;
  backdrop-filter:blur(12px);
}
.skel-row { display:flex;align-items:center;gap:12px;margin-bottom:14px; }
.skel-circle {
  width:44px;height:44px;border-radius:50%;
  background:rgba(148,163,184,0.08);animation:shimmer 1.4s ease infinite;flex-shrink:0;
}
.skel-lines { flex:1; }
.skel-line {
  height:10px;border-radius:6px;
  background:rgba(148,163,184,0.08);animation:shimmer 1.4s ease infinite;margin-bottom:6px;
}
.skel-line.short { width:55%; }
.skel-block {
  height:160px;border-radius:12px;
  background:rgba(148,163,184,0.06);animation:shimmer 1.4s ease infinite;
}
@keyframes shimmer {
  0%,100% { opacity:0.5; }
  50%      { opacity:1; }
}

/* ── POST CARD ──────────────────────────────── */
.post-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px 20px;margin-bottom:16px;
  backdrop-filter:blur(16px);
  animation:cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.post-card:hover {
  border-color:rgba(56,189,248,0.18);
  box-shadow:0 4px 30px rgba(0,0,0,0.25);
}

@keyframes cardIn {
  from { opacity:0;transform:translateY(18px); }
  to   { opacity:1;transform:translateY(0); }
}

.user-row { display:flex;align-items:center;gap:12px;margin-bottom:12px; }
.user-row img {
  width:44px;height:44px;border-radius:14px;object-fit:cover;
  cursor:pointer;border:1.5px solid var(--border);
  transition:border-color 0.2s;flex-shrink:0;
}
.user-row img:hover { border-color:rgba(56,189,248,0.4); }
.user-info { flex:1;min-width:0; }
.user-name {
  font-family:var(--font-d);font-weight:600;font-size:15px;
  cursor:pointer;color:#f1f5f9;transition:color 0.2s;
}
.user-name:hover { color:var(--accent); }
.user-role-tag {
  font-size:11px;color:var(--muted);
  background:rgba(56,189,248,0.08);
  border:1px solid rgba(56,189,248,0.12);
  padding:1px 7px;border-radius:50px;
  display:inline-block;margin-top:2px;
}
.post-content { font-size:14.5px;line-height:1.65;color:#cbd5e1;margin-bottom:12px; }
.post-media {
  width:100%;border-radius:14px;margin-bottom:14px;display:block;
  background:rgba(15,23,42,0.5);
}
audio.post-media {
  height:44px;filter:invert(0.85) hue-rotate(180deg);
}

.post-actions { display:flex;gap:8px;margin-bottom:14px; }
.post-action-btn {
  flex:1;padding:8px 10px;border-radius:12px;
  border:1px solid var(--border);
  background:rgba(15,23,42,0.5);color:var(--muted);
  font-family:var(--font-b);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background 0.2s,color 0.2s,border-color 0.2s;
}
.post-action-btn svg {
  width:15px;height:15px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
}
.post-action-btn:hover { background:rgba(56,189,248,0.08);color:var(--accent);border-color:rgba(56,189,248,0.2); }
.post-action-btn.liked { color:#f472b6;border-color:rgba(244,114,182,0.3);background:rgba(244,114,182,0.06); }
.post-action-btn.delete-action:hover { color:#f87171;border-color:rgba(248,113,113,0.25);background:rgba(248,113,113,0.06); }

.comment-box { display:flex;gap:8px;align-items:center;margin-bottom:10px; }
.comment-box input {
  flex:1;padding:9px 14px;border-radius:50px;
  border:1px solid var(--border);
  background:rgba(15,23,42,0.7);color:var(--text);
  font-family:var(--font-b);font-size:13px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.comment-box input::placeholder { color:var(--muted); }
.comment-box input:focus {
  border-color:rgba(56,189,248,0.4);
  box-shadow:0 0 0 3px rgba(56,189,248,0.07);
}
.comment-send-btn {
  width:36px;height:36px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform 0.2s,box-shadow 0.2s;
}
.comment-send-btn:hover { transform:scale(1.1);box-shadow:0 4px 14px rgba(56,189,248,0.3); }
.comment-send-btn svg {
  width:15px;height:15px;stroke:white;fill:none;
  stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
}

.comment {
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;
  background:rgba(15,23,42,0.5);border:1px solid var(--border);
  padding:7px 12px;border-radius:10px;margin-top:6px;color:#94a3b8;
}
.delete-btn {
  font-size:12px;cursor:pointer;opacity:0.45;
  transition:opacity 0.2s;padding:2px 4px;flex-shrink:0;
}
.delete-btn:hover { opacity:1; }

/* ── FEED LABEL ─────────────────────────────── */
.feed-label {
  font-family:var(--font-d);font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;padding-left:4px;
}

/* ── FLOATING CHAT ──────────────────────────── */
#chatFloating {
  position:fixed;bottom:24px;right:24px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:300;
  transition:transform 0.25s,box-shadow 0.25s;
  animation:pulse 2.5s ease-in-out infinite;
}
#chatFloating svg { width:24px;height:24px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; }
#chatFloating:hover { transform:scale(1.12);animation:none;box-shadow:0 0 30px rgba(56,189,248,0.55); }

@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(56,189,248,0.45); }
  50%      { box-shadow:0 0 0 10px rgba(56,189,248,0); }
}

#msgCount {
  position:absolute;top:-3px;right:-3px;
  min-width:18px;height:18px;
  background:#ef4444;font-size:10px;font-weight:700;color:white;
  display:none;align-items:center;justify-content:center;
  padding:0 4px;border-radius:50%;border:2px solid var(--bg);
}
#msgCount.show { display:flex; }

@media(max-width:480px){
  .page { padding:14px 12px 90px; }
  .profile-card { padding:16px;gap:12px; }
  .profile-welcome { font-size:16px; }
  .post-card { padding:14px 16px; }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<!-- ── NAVBAR ── -->
<nav class="navbar">

  <a class="nav-brand" href="home.html">
    <div class="nav-brand-icon">🎸</div>
    <span class="nav-brand-name">CollabTune</span>
  </a>

  <div class="nav-search">
    <svg class="nav-search-icon" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search musicians, posts…" autocomplete="off">
  </div>

  <div class="nav-actions">
    <!-- FIX #3 — messages with live badge in navbar -->
    <button class="nav-btn" data-tip="Messages" onclick="navigate('chat.html')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-badge" id="navMsgBadge"></span>
    </button>
    <button class="nav-btn" data-tip="Profile" onclick="navigate('profile.html')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button class="nav-btn danger" data-tip="Logout" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

</nav>

<!-- ── MAIN ── -->
<main class="page">

  <div class="profile-card" id="profileCard">
    <img id="profileAvatar" class="profile-avatar" src="https://via.placeholder.com/56" alt="avatar">
    <div class="profile-text">
      <div class="profile-welcome" id="welcome">Loading…</div>
      <div class="profile-meta" id="userRole"></div>
      <div class="profile-meta" id="userBio"></div>
    </div>
    <div class="mini-wave" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="action-buttons">
    <button class="action-btn" onclick="navigate('createpost.html')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Create Post</span>
    </button>
    <button class="action-btn" onclick="navigate('explore.html')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Explore</span>
    </button>
  </div>

  <div class="feed-label">Your Feed</div>

  <!-- FIX #2 — skeletons show immediately while posts load -->
  <div id="skeletons">
    <div class="skeleton">
      <div class="skel-row">
        <div class="skel-circle"></div>
        <div class="skel-lines">
          <div class="skel-line" style="width:42%"></div>
          <div class="skel-line short"></div>
        </div>
      </div>
      <div class="skel-block"></div>
    </div>
    <div class="skeleton">
      <div class="skel-row">
        <div class="skel-circle"></div>
        <div class="skel-lines">
          <div class="skel-line" style="width:58%"></div>
          <div class="skel-line short"></div>
        </div>
      </div>
      <div class="skel-block" style="height:72px"></div>
    </div>
    <div class="skeleton">
      <div class="skel-row">
        <div class="skel-circle"></div>
        <div class="skel-lines">
          <div class="skel-line" style="width:35%"></div>
          <div class="skel-line short"></div>
        </div>
      </div>
      <div class="skel-block" style="height:110px"></div>
    </div>
  </div>

  <div id="feed"></div>

</main>

<div id="chatFloating" onclick="navigate('chat.html')">
  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  <span id="msgCount"></span>
</div>

<!-- ── ANIMATED BACKGROUND ── -->
<script type="module">
import { auth, db } from "./js/firebase-config.js";
import {
  doc, getDoc, collection, query, orderBy, onSnapshot,
  updateDoc, deleteDoc, where, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const userCache = {}; 
const postCache = new Map();

/* 🔐 AUTH & INITIALIZATION */
onAuthStateChanged(auth, async user => {
  if (user) {
    loadProfile(user.uid);
    loadPosts();
    loadUnreadMessages();
    setupSearch(); // Initialize Enter key listener
  } else {
    location.href = "index.html";
  }
});

/* 👤 PROFILE */
async function loadProfile(uid) {
  const snap = await getDoc(doc(db, "users", uid));
  if (!snap.exists()) return;
  const d = snap.data();
  document.getElementById('welcome').innerText = "Welcome, " + d.name;
  document.getElementById('userRole').innerText = d.role ? "🎵 " + d.role : "";
  document.getElementById('userBio').innerText = d.bio ? d.bio : "";
  if (d.profileImage) document.getElementById('profileAvatar').src = d.profileImage;
  document.getElementById('profileCard').style.opacity = '1';
}

/* 🔍 SEARCH LOGIC (FIX #1) */
function setupSearch() {
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const term = searchInput.value.trim();
      // FIXED: Redirecting to search.html instead of explore.html
      if (term) location.href = `search.html?search=${encodeURIComponent(term)}`;
    }
  });
}

/* 📰 POSTS (FIX #2, #3, #5) */
function loadPosts() {
  const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(20));

  onSnapshot(q, async snap => {
    const sk = document.getElementById('skeletons');
    if (sk) sk.remove();

    const feed = document.getElementById('feed');
    
    // 1. Identify missing users to fetch in parallel (Latency Fix)
    const neededUids = [...new Set(snap.docs.map(d => d.data().userId))];
    await Promise.all(neededUids.map(async uid => {
      if (!userCache[uid]) {
        const uSnap = await getDoc(doc(db, "users", uid));
        userCache[uid] = uSnap.data() || { name: "User" };
      }
    }));

    // 2. Render Posts
    for (const docSnap of snap.docs) {
      const post = docSnap.data();
      const postId = docSnap.id;
      const serial = JSON.stringify(post);

      // DOM Reconciliation: Don't re-render if data is identical (Anti-Flicker Fix)
      let card = feed.querySelector(`.post-card[data-id="${postId}"]`);
      if (postCache.get(postId) === serial && card) continue;
      postCache.set(postId, serial);

      const user = userCache[post.userId];
      const likes = post.likes || [];
      const liked = auth.currentUser && likes.includes(auth.currentUser.uid);
      const isMe = auth.currentUser && post.userId === auth.currentUser.uid;

      // Media Logic
      let media = "";
      if (post.mediaURL) {
        if (post.mediaType === "image") media = `<img src="${post.mediaURL}" class="post-media" loading="lazy">`;
        else if (post.mediaType === "video") media = `<video controls class="post-media"><source src="${post.mediaURL}"></video>`;
        else if (post.mediaType === "audio") media = `<audio controls class="post-media"><source src="${post.mediaURL}"></audio>`;
      }

      // Comments Logic (User Name Fix)
      let commentsHTML = "";
      for (const c of (post.comments || [])) {
        if (!userCache[c.uid]) {
          const uSnap = await getDoc(doc(db, "users", c.uid));
          userCache[c.uid] = uSnap.data() || { name: "User" };
        }
        const cUser = userCache[c.uid];
        const isOwner = auth.currentUser && c.uid === auth.currentUser.uid;
        commentsHTML += `
          <div class="comment">
            <span><b style="color:var(--accent)">${cUser.name}:</b> ${c.text}</span>
            ${isOwner ? `<span class="delete-btn" onclick='deleteComment("${postId}",${JSON.stringify(c)})'>✕</span>` : ""}
          </div>`;
      }

      const html = `
        <div class="user-row">
          <img src="${user.profileImage || 'https://via.placeholder.com/44'}" onclick="viewProfile('${post.userId}')">
          <div class="user-info">
            <div class="user-name" onclick="viewProfile('${post.userId}')">${user.name || "User"}</div>
            ${user.role ? `<span class="user-role-tag">${user.role}</span>` : ""}
          </div>
        </div>
        ${post.content ? `<p class="post-content">${post.content}</p>` : ""}
        ${media}
        <div class="post-actions">
          <button class="post-action-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${postId}')">
            <svg viewBox="0 0 24 24" ${liked ? 'style="fill:#f472b6;stroke:#f472b6"' : ''}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ${likes.length}
          </button>
          <button class="post-action-btn" onclick="sharePost('${postId}')">
            <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share
          </button>
          ${isMe ? `<button class="post-action-btn delete-action" onclick="deletePost('${postId}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Delete</button>` : ""}
        </div>
        <div class="comment-box">
          <input id="cmt-${postId}" placeholder="Add a comment…">
          <button class="comment-send-btn" onclick="addComment('${postId}')">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        ${commentsHTML}
      `;

      if (card) {
        card.innerHTML = html;
      } else {
        card = document.createElement("div");
        card.className = "post-card";
        card.dataset.id = postId;
        card.innerHTML = html;
        feed.appendChild(card); // appendChild works for desc since snapshot order is desc
      }
    }
  });
}

/* ❤️ INTERACTION FUNCTIONS */
window.toggleLike = async id => {
  const ref = doc(db, "posts", id);
  const snap = await getDoc(ref);
  const likes = snap.data().likes || [];
  const uid = auth.currentUser.uid;
  await updateDoc(ref, { likes: likes.includes(uid) ? arrayRemove(uid) : arrayUnion(uid) });
};

window.addComment = async id => {
  const input = document.getElementById(`cmt-${id}`);
  if (!input.value.trim()) return;
  await updateDoc(doc(db, "posts", id), {
    comments: arrayUnion({ uid: auth.currentUser.uid, text: input.value.trim(), time: Date.now() })
  });
  input.value = "";
};

window.deleteComment = async (id, c) => {
  await updateDoc(doc(db, "posts", id), { comments: arrayRemove(c) });
};

window.deletePost = async id => {
  if (confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id));
};

/* 🔔 UNREAD MESSAGES (FIX #4) */
function loadUnreadMessages() {
  const q = query(collection(db, "messages"), where("receiverId", "==", auth.currentUser.uid), where("seen", "==", false));
  onSnapshot(q, snap => {
    const count = snap.size;
    const floatBadge = document.getElementById('msgCount');
    const navBadge = document.getElementById('navMsgBadge');
    
    if (floatBadge) {
      floatBadge.innerText = count;
      floatBadge.classList.toggle('show', count > 0);
    }
    if (navBadge) {
      navBadge.innerText = count > 9 ? '9+' : count;
      navBadge.classList.toggle('show', count > 0);
    }
  });
}

/* 🧭 NAVIGATION */
window.sharePost = id => {
  const url = `${location.origin}${location.pathname}?post=${id}`;
  navigator.clipboard.writeText(url).then(() => alert("Link copied!"));
};

window.navigate = p => location.href = p;
window.viewProfile = id => location.href = "profile.html?uid=" + id;
window.logout = async () => { await signOut(auth); location.href = "index.html"; };
</script>>
