<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* 🔥 NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(17, 24, 39, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
}

.nav-link {
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.nav-link:hover {
    color: #38bdf8;
}

.nav-center input {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    width: 200px;
}

/* 📦 CONTAINER */
.container {
    max-width: 700px;
    margin: auto;
    padding: 15px;
}

/* 👤 PROFILE */
.profile-box {
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* 🎯 BUTTONS */
.action-buttons {
    display: flex;
    gap: 10px;
    margin: 15px 0;
}

.action-buttons button {
    flex: 1;
    padding: 10px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #8b5cf6);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.action-buttons button:hover {
    transform: scale(1.05);
}

/* 📝 POST */
.post-card {
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
    backdrop-filter: blur(10px);
}

/* 👤 USER */
.user-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.user-row img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
}

/* 🎬 MEDIA */
.post-media {
    width: 100%;
    margin-top: 10px;
    border-radius: 12px;
}

/* ❤️ ACTIONS */
.post-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.post-actions button {
    flex: 1;
    padding: 8px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #111827;
    color: white;
}

.post-actions button:hover {
    background: #1e293b;
}

/* 💬 COMMENTS */
.comment-box {
    margin-top: 10px;
    display: flex;
    gap: 5px;
}

.comment-box input {
    flex: 1;
    padding: 8px;
    border-radius: 20px;
    border: none;
}

.comment-box button {
    border-radius: 20px;
    padding: 6px 10px;
}

.comment {
    margin-top: 5px;
    font-size: 13px;
    background: #111827;
    padding: 6px;
    border-radius: 8px;
}

.delete-btn {
    color: red;
    cursor: pointer;
    margin-left: 5px;
}

/* 📱 MOBILE */
@media(max-width:600px){
    .nav-center input {
        width: 120px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-link" onclick="navigate('profile.html')">Profile</div>

    <div class="nav-center">
        <input type="text" id="searchInput" placeholder="Search">
    </div>

    <div class="nav-link" onclick="navigate('chat.html')">Messages</div>
    <div class="nav-link" onclick="logout()">Logout</div>
</div>

<div class="container">

<div class="profile-box">
    <h2 id="welcome"></h2>
    <p id="userRole"></p>
    <p id="userBio"></p>
</div>

<div class="action-buttons">
    <button onclick="navigate('createpost.html')">Create</button>
    <button onclick="navigate('explore.html')">Explore</button>
</div>

<div id="feed"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { 
doc, getDoc, collection, query, orderBy, onSnapshot, updateDoc, deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { arrayUnion, arrayRemove } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

searchInput.addEventListener("keypress", e=>{
    if(e.key==="Enter"){
        location.href="search.html?role="+e.target.value;
    }
});

onAuthStateChanged(auth, async user=>{
    if(user){
        loadProfile(user.uid);
        loadPosts();
    }else location.href="index.html";
});

async function loadProfile(uid){
    const snap=await getDoc(doc(db,"users",uid));
    const d=snap.data();
    welcome.innerText="Welcome "+d.name;
    userRole.innerText="Instrument: "+(d.instrument||"");
    userBio.innerText="Bio: "+(d.bio||"");
}

function loadPosts(){

const q=query(collection(db,"posts"),orderBy("timestamp","desc"));

onSnapshot(q, async snap=>{

feed.innerHTML="";

for(const docSnap of snap.docs){

const post=docSnap.data();
const postId=docSnap.id;

const userSnap=await getDoc(doc(db,"users",post.userId));
const user=userSnap.data()||{};

const likes=post.likes||[];
const liked=likes.includes(auth.currentUser.uid);

let media="";
if(post.mediaURL){
if(post.mediaType==="image") media=`<img src="${post.mediaURL}" class="post-media">`;
else if(post.mediaType==="video") media=`<video controls class="post-media"><source src="${post.mediaURL}"></video>`;
else if(post.mediaType==="audio") media=`<audio controls class="post-media"><source src="${post.mediaURL}"></audio>`;
}

let comments="";
(post.comments||[]).forEach(c=>{
const isOwner=c.uid===auth.currentUser.uid;
comments+=`
<div class="comment">
${c.text}
${isOwner?`<span class="delete-btn" onclick='deleteComment("${postId}", ${JSON.stringify(c)})'>❌</span>`:""}
</div>`;
});

feed.innerHTML+=`
<div class="post-card">

<div class="user-row">
<img src="${user.profileImage||'https://via.placeholder.com/40'}"
onclick="viewProfile('${post.userId}')">
<h4 onclick="viewProfile('${post.userId}')">${user.name||"User"}</h4>
</div>

<p>${post.content||""}</p>

${media}

<div class="post-actions">
<button onclick="toggleLike('${postId}')">${liked?"❤️":"🤍"} ${likes.length}</button>
<button onclick="sharePost('${postId}')">🔗</button>
${post.userId===auth.currentUser.uid?
`<button onclick="deletePost('${postId}')">🗑</button>`:""}
</div>

<div class="comment-box">
<input id="cmt-${postId}" placeholder="Write comment...">
<button onclick="addComment('${postId}')">➤</button>
</div>

${comments}

</div>`;
}
});
}

window.toggleLike=async id=>{
const ref=doc(db,"posts",id);
const snap=await getDoc(ref);
const likes=snap.data().likes||[];

if(likes.includes(auth.currentUser.uid))
await updateDoc(ref,{likes:arrayRemove(auth.currentUser.uid)});
else
await updateDoc(ref,{likes:arrayUnion(auth.currentUser.uid)});
};

window.deletePost=async id=>{
if(confirm("Delete post?"))
await deleteDoc(doc(db,"posts",id));
};

window.sharePost=id=>{
navigator.clipboard.writeText(location.href+"?post="+id);
alert("Link copied 🔗");
};

window.addComment=async id=>{
const input=document.getElementById(`cmt-${id}`);
if(!input.value.trim()) return;

await updateDoc(doc(db,"posts",id),{
comments:arrayUnion({
uid:auth.currentUser.uid,
text:input.value,
time:Date.now()
})
});

input.value="";
};

window.deleteComment=async(id,c)=>{
await updateDoc(doc(db,"posts",id),{
comments:arrayRemove(c)
});
};

window.navigate=p=>location.href=p;
window.viewProfile=id=>location.href="profile.html?uid="+id;
window.logout=async()=>{await signOut(auth);location.href="index.html";};

</script>

</body>
</html>
