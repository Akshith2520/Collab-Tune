<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Profile Test</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="domain" placeholder="Domain">
<input id="location" placeholder="Location">
<input id="experience" placeholder="Experience">
<textarea id="bio" placeholder="Bio"></textarea>

<input type="file" id="profilePic">

<button onclick="saveProfile()">Save</button>

<p id="status"></p>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";

import { 
doc, getDoc, setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let currentUser;
let uploadedImageURL = "";

/* 📦 GET ELEMENTS SAFELY */
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const domainInput = document.getElementById("domain");
const locationInput = document.getElementById("location");
const experienceInput = document.getElementById("experience");
const bioInput = document.getElementById("bio");

const profilePicInput = document.getElementById("profilePic");
const profileImg = document.getElementById("profileImg");
const statusText = document.getElementById("status");

/* 🔐 AUTH */
onAuthStateChanged(auth, async user=>{
    if(!user){
        alert("Not logged in ❌");
        location.href="index.html";
        return;
    }

    currentUser = user;

    console.log("Logged in UID:", user.uid);

    loadProfile();
});

/* 📥 LOAD PROFILE */
async function loadProfile(){

    const snap = await getDoc(doc(db,"users",currentUser.uid));
    const d = snap.data() || {};

    nameInput.value = d.name || "";
    phoneInput.value = d.phone || "";
    domainInput.value = d.domain || "";
    locationInput.value = d.location || "";
    experienceInput.value = d.experience || "";
    bioInput.value = d.bio || "";

    if (profileImg && d.profileImage) {
        profileImg.src = d.profileImage;
    }
}

/* 📸 IMAGE UPLOAD */
if (profilePicInput) {
profilePicInput.addEventListener("change", async function(){

    const file = this.files[0];
    if(!file) return;

    console.log("Uploading image...");

    // 👀 Preview
    if (profileImg) {
        profileImg.src = URL.createObjectURL(file);
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "Collab-Tune");

    try {
        const res = await fetch(
            "https://api.cloudinary.com/v1_1/dcnlky6zb/upload",
            { method: "POST", body: formData }
        );

        const data = await res.json();

        uploadedImageURL = data.secure_url;

        console.log("Image uploaded:", uploadedImageURL);

    } catch(err){
        console.error("Cloudinary error:", err);
    }
});
}

/* 💾 SAVE PROFILE */
window.saveProfile = async function(){

    try {

        console.log("Saving profile...");

        if (statusText) statusText.innerText = "Saving...";

        const snap = await getDoc(doc(db,"users",currentUser.uid));
        const existing = snap.data() || {};

        let finalImage = existing.profileImage || "";

        if(uploadedImageURL){
            finalImage = uploadedImageURL;
        }

        await setDoc(doc(db,"users",currentUser.uid),{
            name: nameInput.value || "",
            phone: phoneInput.value || "",
            domain: domainInput.value || "",
            location: locationInput.value || "",
            experience: experienceInput.value || "",
            bio: bioInput.value || "",
            profileImage: finalImage
        }, { merge: true });

        console.log("Saved ✅");

        if (statusText) statusText.innerText = "Saved successfully ✅";

        uploadedImageURL = "";

    } catch (error) {

        console.error("SAVE ERROR:", error);

        if (statusText) statusText.innerText = "Error: " + error.message;
    }
};

</script>

</body>
</html>
