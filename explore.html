<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Explore Musicians</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* 📦 CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* 🔝 HEADER */
.header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.back-btn {
    cursor: pointer;
    color: #38bdf8;
}

/* 🔍 SEARCH */
.search-box {
    margin-bottom: 20px;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* 🧱 GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

/* 👤 CARD */
.card {
    background: rgba(30, 41, 59, 0.8);
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

/* 👤 IMAGE */
.card img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
}

/* 🎯 BUTTONS */
.btn-row {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

.btn {
    flex: 1;
    padding: 8px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.message {
    background: #38bdf8;
}

.follow {
    background: #8b5cf6;
}

/* 📱 MOBILE */
@media(max-width:600px){
    .container {
        padding: 15px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <span class="back-btn" onclick="goBack()">⬅</span>
    <h2>Explore Musicians</h2>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search musicians...">
</div>

<div id="exploreList" class="grid"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase-config.js";
import { collection, getDocs, doc, updateDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { arrayUnion, arrayRemove } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let currentUserId = "";

// 🔙 Back
window.goBack = () => location.href = "home.html";

// 🔐 Auth
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserId = user.uid;
        loadUsers();
    } else {
        location.href = "index.html";
    }
});

// 🔍 SEARCH FILTER
searchInput.addEventListener("input", loadUsers);

// 📥 LOAD USERS
async function loadUsers() {

    const snapshot = await getDocs(collection(db, "users"));
    const container = document.getElementById("exploreList");
    const search = searchInput.value.toLowerCase();

    container.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const user = docSnap.data();
        const uid = docSnap.id;

        if (uid === currentUserId) return;

        const name = (user.name || "").toLowerCase();
        const role = (user.role || user.domain || "").toLowerCase();

        if (!name.includes(search) && !role.includes(search)) return;

        container.innerHTML += `
            <div class="card">
                <img src="${user.profileImage || 'https://via.placeholder.com/70'}">
                <h3>${user.name}</h3>
                <p>${user.role || user.domain || "Musician"}</p>
                <p>${user.bio || ""}</p>

                <div class="btn-row">
                    <button class="btn message" onclick="startChat('${uid}')">💬</button>
                    <button class="btn follow" onclick="toggleFollow('${uid}')">➕</button>
                </div>
            </div>
        `;
    });

    if (container.innerHTML === "") {
        container.innerHTML = "<p>No users found 😢</p>";
    }
}

// 💬 CHAT
window.startChat = uid => location.href = "chat.html?uid=" + uid;

// 👥 FOLLOW
window.toggleFollow = async function(uid) {

    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);

    const followers = snap.data().followers || [];

    if (followers.includes(currentUserId)) {
        await updateDoc(ref, {
            followers: arrayRemove(currentUserId)
        });
        alert("Unfollowed");
    } else {
        await updateDoc(ref, {
            followers: arrayUnion(currentUserId)
        });
        alert("Followed");
    }
};

</script>

</body>
</html>
