<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CollabTune - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', Arial, sans-serif;
    background: #060d1f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── CANVAS BACKGROUND ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── AMBIENT GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: orbDrift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 380px; height: 380px; background: #7c3aed; top: -100px; left: -80px; animation-duration: 14s; }
  .orb-2 { width: 300px; height: 300px; background: #0ea5e9; bottom: -80px; right: -60px; animation-duration: 10s; animation-delay: -5s; }
  .orb-3 { width: 200px; height: 200px; background: #a855f7; bottom: 30%; left: 10%; animation-duration: 16s; animation-delay: -3s; }

  @keyframes orbDrift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── CARD ── */
  .container {
    position: relative;
    z-index: 10;
    width: 380px;
    padding: 38px 36px 32px;
    border-radius: 22px;
    background: rgba(15, 23, 42, 0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(148, 163, 184, 0.1);
    box-shadow: 0 0 0 1px rgba(56,189,248,0.06), 0 32px 64px rgba(0,0,0,0.55);
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── LOGO AREA ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
    gap: 6px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 4px;
    animation: iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    box-shadow: 0 0 24px rgba(124,58,237,0.4);
  }

  @keyframes iconPop {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Waveform bars under logo */
  .waveform {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 18px;
    margin-top: 2px;
  }
  .waveform span {
    display: block;
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(to top, #38bdf8, #8b5cf6);
    animation: waveBounce 1.1s ease-in-out infinite alternate;
  }
  .waveform span:nth-child(1)  { height: 6px;  animation-delay: 0s; }
  .waveform span:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
  .waveform span:nth-child(3)  { height: 9px;  animation-delay: 0.2s; }
  .waveform span:nth-child(4)  { height: 16px; animation-delay: 0.15s; }
  .waveform span:nth-child(5)  { height: 11px; animation-delay: 0.05s; }
  .waveform span:nth-child(6)  { height: 18px; animation-delay: 0.25s; }
  .waveform span:nth-child(7)  { height: 8px;  animation-delay: 0.35s; }
  .waveform span:nth-child(8)  { height: 13px; animation-delay: 0.1s; }
  .waveform span:nth-child(9)  { height: 6px;  animation-delay: 0.4s; }

  @keyframes waveBounce {
    from { transform: scaleY(0.4); opacity: 0.6; }
    to   { transform: scaleY(1);   opacity: 1; }
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0.2px;
  }

  /* ── INPUTS ── */
  .input-group {
    position: relative;
    margin-bottom: 12px;
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  .input-group:nth-child(1) { animation-delay: 0.15s; }
  .input-group:nth-child(2) { animation-delay: 0.22s; }
  .input-group:nth-child(3) { animation-delay: 0.29s; }
  .input-group:nth-child(4) { animation-delay: 0.36s; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    pointer-events: none;
    opacity: 0.55;
  }

  input {
    width: 100%;
    padding: 12px 14px 12px 38px;
    border-radius: 11px;
    border: 1px solid rgba(148,163,184,0.12);
    background: rgba(15, 23, 42, 0.7);
    color: #e2e8f0;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }

  input::placeholder { color: #475569; }

  input:focus {
    border-color: rgba(56,189,248,0.5);
    background: rgba(15, 23, 42, 0.95);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.1), 0 0 16px rgba(56,189,248,0.08);
  }

  input:hover:not(:focus) {
    border-color: rgba(148,163,184,0.22);
  }

  /* ── BUTTON ── */
  .btn-wrap {
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.42s both;
  }

  button {
    width: 100%;
    padding: 13px;
    margin-top: 6px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #38bdf8 0%, #7c3aed 60%, #a855f7 100%);
    color: white;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.35);
    letter-spacing: 0.2px;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,58,237,0.5);
  }

  button:hover::after { opacity: 1; }

  button:active {
    transform: scale(0.97) translateY(0);
  }

  button.loading {
    pointer-events: none;
    opacity: 0.85;
  }

  /* Shimmer sweep on button */
  button .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.22), transparent);
    animation: shimmerSweep 2.4s ease-in-out infinite;
  }

  @keyframes shimmerSweep {
    0%   { left: -100%; }
    60%  { left: 140%; }
    100% { left: 140%; }
  }

  /* ── ERROR ── */
  .error {
    color: #f87171;
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
    text-align: center;
    animation: errShake 0.3s ease;
  }

  @keyframes errShake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 14px;
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.48s both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(148,163,184,0.1);
  }

  .divider span {
    font-size: 12px;
    color: #475569;
  }

  /* ── LINK ── */
  .link {
    text-align: center;
    font-size: 13.5px;
    color: #64748b;
    animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) 0.52s both;
  }

  .link a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .link a:hover {
    color: #7dd3fc;
    text-decoration: underline;
  }

  /* ── MOBILE ── */
  @media(max-width: 420px) {
    .container { width: 92%; padding: 28px 22px 24px; }
  }
</style>
</head>

<body>

<!-- Ambient glows -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Floating music notes canvas -->
<canvas id="bgCanvas"></canvas>

<div class="container">

  <div class="logo-wrap">
    <div class="logo-icon">🎸</div>
    <div class="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="title">CollabTune</div>
    <div class="subtitle">Join the music community</div>
  </div>

  <div class="input-group">
    <span class="input-icon">👤</span>
    <input type="text" id="name" placeholder="Full Name" autocomplete="name">
  </div>

  <div class="input-group">
    <span class="input-icon">🎵</span>
    <input type="text" id="instrument" placeholder="Instrument (Guitar, Piano…)" autocomplete="off">
  </div>

  <div class="input-group">
    <span class="input-icon">✉️</span>
    <input type="email" id="email" placeholder="Email Address" autocomplete="email">
  </div>

  <div class="input-group">
    <span class="input-icon">🔒</span>
    <input type="password" id="password" placeholder="Password" autocomplete="new-password">
  </div>

  <div class="btn-wrap">
    <button id="signupBtn" onclick="signup()">
      <span class="shimmer"></span>
      Create Account
    </button>
  </div>

  <p class="error" id="errorMsg"></p>

  <div class="divider"><span>or</span></div>

  <div class="link">
    Already have an account?&nbsp;
    <a href="index.html">Sign in</a>
  </div>

</div>

<!-- Floating notes background -->
<script>
(function() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');

  const notes  = ['♩','♪','♫','♬','𝄞','𝄢'];
  const particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function spawn() {
    particles.push({
      x: Math.random() * canvas.width,
      y: canvas.height + 20,
      note: notes[Math.floor(Math.random() * notes.length)],
      size: 14 + Math.random() * 18,
      speed: 0.4 + Math.random() * 0.7,
      drift: (Math.random() - 0.5) * 0.4,
      opacity: 0.08 + Math.random() * 0.14,
      rotation: (Math.random() - 0.5) * 0.06,
      angle: Math.random() * Math.PI * 2
    });
  }

  let frame = 0;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    if (frame % 55 === 0) spawn();

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.y -= p.speed;
      p.x += p.drift + Math.sin(p.angle) * 0.3;
      p.angle += 0.012;

      if (p.y < -30) { particles.splice(i, 1); continue; }

      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.font = `${p.size}px serif`;
      ctx.fillStyle = '#a78bfa';
      ctx.fillText(p.note, 0, 0);
      ctx.restore();
    }

    requestAnimationFrame(loop);
  }

  for (let i = 0; i < 12; i++) {
    spawn();
    particles[particles.length - 1].y = Math.random() * window.innerHeight;
  }

  loop();
})();
</script>

<script type="module">

import { createUserWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { setDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { auth, db } from "./js/firebase-config.js";

window.signup = async function() {

  const name       = document.getElementById("name").value;
  const instrument = document.getElementById("instrument").value;
  const email      = document.getElementById("email").value;
  const password   = document.getElementById("password").value;
  const btn        = document.getElementById("signupBtn");
  const errorMsg   = document.getElementById("errorMsg");

  errorMsg.innerText = "";

  if (!name || !email || !password) {
    errorMsg.innerText = "Please fill required fields ⚠️";
    return;
  }

  btn.classList.add("loading");
  btn.innerText = "Creating account…";

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      name:         name,
      email:        email,
      role:         (instrument || "").toLowerCase(),
      bio:          "",
      profileImage: "",
      createdAt:    new Date()
    });

    window.location.href = "home.html";

  } catch (error) {
    errorMsg.innerText = "Signup failed ❌";
    btn.classList.remove("loading");
    btn.innerText = "Create Account";
  }
};

</script>

</body>
</html>
