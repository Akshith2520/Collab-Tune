<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CollabTune - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🌟 CONTAINER */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    text-align: center;
}

/* 🎸 TITLE */
.title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
}

/* ✏️ INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus {
    box-shadow: 0 0 10px #38bdf8;
}

/* 🚀 BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #38bdf8, #8b5cf6);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* ⚠ ERROR */
.error {
    color: #f87171;
    font-size: 14px;
    margin-top: 10px;
}

/* 🔗 LOGIN LINK */
.link {
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #38bdf8;
    text-decoration: none;
}

/* 📱 MOBILE */
@media(max-width:400px){
    .container {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="title">🎸 CollabTune</div>
    <div class="subtitle">Join the music community</div>

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="instrument" placeholder="Instrument (Guitar, Piano...)">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>

    <p class="error" id="errorMsg"></p>

    <div class="link">
        Already have an account? 
        <a href="index.html">Login</a>
    </div>

</div>

<script type="module">

import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { auth, db } from "./js/firebase-config.js";

window.signup = async function() {

    const name = nameInput.value = document.getElementById("name").value;
    const instrument = document.getElementById("instrument").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!name || !email || !password) {
        errorMsg.innerText = "Please fill required fields ⚠️";
        return;
    }

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
            name: name,
            email: email,
            role: (instrument || "").toLowerCase(),
            bio: "",
            profileImage: "",
            createdAt: new Date()
        });

        window.location.href = "home.html";

    } catch (error) {
        errorMsg.innerText = "Signup failed ❌";
    }
};

</script>

</body>
</html>
